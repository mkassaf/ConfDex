name: Publish Docker image

on:
  push:
    branches: [main]
    tags: ["v*"]          # also publish on version tags, e.g. v1.0.0

jobs:
  # ── Run tests ────────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv pip install --system ".[dev]"

      - name: Run tests
        run: pytest tests/ --tb=short -q

  # ── Build & push image to Docker Hub ────────────────────────────────────────
  push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/confdex
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          labels: |
            org.opencontainers.image.title=ConfDex
            org.opencontainers.image.description=Scrape, summarize, and find relevant papers from academic conferences. Self-hosted web app with local (Ollama) and remote LLM support.
            org.opencontainers.image.vendor=Mustafa Assaf

      - name: Set up QEMU (for cross-platform builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/confdex
          short-description: "Scrape, summarize, and score academic conference papers using local or remote LLMs."
          readme-filepath: ./README.md

  # ── Deploy to server ─────────────────────────────────────────────────────────
  # Required secrets: SSH_HOST, SSH_USER, SSH_PRIVATE_KEY, ADMIN_PASSWORD
  deploy:
    needs: push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for compose files)
        uses: actions/checkout@v4

      - name: Sync compose files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          source:   "docker-compose.yml,docker-compose.caddy.yml,Caddyfile"
          target:   "~/confdex"

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/confdex
            echo "ADMIN_USERNAME=admin" > .env
            echo "ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}" >> .env
            echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" >> .env
            echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env
            echo "DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}" >> .env
            echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
            echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" >> .env
            echo "MISTRAL_API_KEY=${{ secrets.MISTRAL_API_KEY }}" >> .env
            echo "FREEINFERENCE_API_KEY=${{ secrets.FREEINFERENCE_API_KEY }}" >> .env
            echo "DISABLE_OLLAMA=${{ secrets.DISABLE_OLLAMA }}" >> .env
            echo "MAX_JOB_HISTORY_LIMIT=${{ secrets.MAX_JOB_HISTORY_LIMIT }}" >> .env
            docker image prune -af
            docker compose -f docker-compose.yml -f docker-compose.caddy.yml pull confdex
            docker compose -f docker-compose.yml -f docker-compose.caddy.yml up -d --no-deps --force-recreate confdex
