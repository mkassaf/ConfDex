name: Publish Docker image

on:
  push:
    branches: [main]
    tags: ["v*"]          # also publish on version tags, e.g. v1.0.0

jobs:
  # ── Run tests ────────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv pip install --system ".[dev]"

      - name: Run tests
        run: pytest tests/ --tb=short -q

  # ── Build & push image to Docker Hub ────────────────────────────────────────
  push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/confdex
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          labels: |
            org.opencontainers.image.title=ConfDex
            org.opencontainers.image.description=Scrape, summarize, and find relevant papers from academic conferences. Self-hosted web app with local (Ollama) and remote LLM support.
            org.opencontainers.image.vendor=Mustafa Assaf

      - name: Set up QEMU (for cross-platform builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/confdex
          short-description: "Scrape, summarize, and score academic conference papers using local or remote LLMs."
          readme-filepath: ./README.md

  # ── Deploy to server (optional) ─────────────────────────────────────────────
  # Runs only when SSH_HOST variable is set (Settings → Variables → Actions).
  # Required GitHub secrets:    SSH_PRIVATE_KEY, ADMIN_PASSWORD
  # Required GitHub variables:  SSH_HOST, SSH_USER
  deploy:
    needs: push
    runs-on: ubuntu-latest
    # Uses a variable (not secret) for the if-condition — secrets cannot be
    # evaluated in `if` expressions on GitHub Actions.
    if: vars.SSH_HOST != ''
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ vars.SSH_HOST }}
          username: ${{ vars.SSH_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/confdex
            docker image prune -af
            docker compose -f docker-compose.yml -f docker-compose.selfsigned.yml rm -sf confdex
            docker rmi mkassaf/confdex:latest 2>/dev/null || true
            docker compose -f docker-compose.yml -f docker-compose.selfsigned.yml pull confdex nginx
            ADMIN_PASSWORD="${{ secrets.ADMIN_PASSWORD }}" \
            HOST_IP="${{ vars.SSH_HOST }}" \
            docker compose -f docker-compose.yml -f docker-compose.selfsigned.yml up -d --no-deps confdex nginx
